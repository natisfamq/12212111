<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Link Redirect</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Automatyczny link przekierowujący: -->
    <a href="/redirect">Zobacz forum</a>
    
    <!-- Zawieszka automatycznego zapisu logów (w tle): -->
    <script src="script.js" defer></script>
    
    <!-- Dodatkowe informacje o adresie IP: -->
    <div id="ip-info">
        <span>Adres IP:</span>
        <span id="ip-address">-zawieszka-</span>
    </div>

</body>
</html>
